llm_provider: openai

openai:
  api_key: ${OPENAI_API_KEY}
  model: gpt-4o
  temperature: 0.2
  max_tokens: 16000
  timeout: 120

anthropic:
  api_key: ${ANTHROPIC_API_KEY}
  model: claude-haiku-4-5-20251001
  temperature: 0.2
  max_tokens: 16000
  timeout: 120

rbi_out_of_order_proxy:
  return_rate_alert: 0.05

portfolio_norms:
  top3_high: 0.60
  cash_share_alert: 0.25
  adb_floor_inr: 100000
  credit_gap_days_alert: 30
  current_ratio_min: 1.0
  debt_equity_max: 3.0
  interest_coverage_min: 1.5
  dscr_min: 1.25
  gst_fs_revenue_gap_alert_pct: 0.30

company_policy:
  min_vintage_years: 2
  min_pat_margin_pct: 0.02
  max_debt_ebitda: 4.0
  min_interest_coverage: 1.5

industry_context: generic

default_meta:
  borrower_name: Unknown
  bank_name: Unknown
  industry_hint: generic
  location: ""

analysis:
  enable_retry: true
  max_retries: 3
  retry_delay: 2
  validate_schema: true
  skip_llm_if_no_api_key: true

output:
  save_json: true
  save_markdown: true
  output_dir: output
  include_evidence_map: true

cases:
  base_dir: cases

api:
  host: 127.0.0.1
  port: 8080
  cors_origins:
    - http://localhost:5173
    - http://localhost:3000
